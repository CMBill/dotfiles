[general]
import = [
  "catppuccin-mocha.toml"
]

[font]
normal = { family = "LXGWWenKaiMono Nerd Font", style = "Regular" }
bold = { family = "LXGWWenKaiMono Nerd Font", style = "Medium" }
italic = { family = "LXGWWenKaiMono Nerd Font", style = "Italic"}
size = 12

[window]
decorations_theme_variant = "Dark"

[cursor]
style = { shape = "Beam"}

[terminal]
shell = { program = "pwsh", args = ["-WorkingDirectory", "~"] }